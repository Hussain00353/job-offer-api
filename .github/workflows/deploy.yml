name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  # ── JOB 1: Run Tests ──────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install django djangorestframework requests boto3 pytest

      - name: Run tests
        run: |
          cd jobofferapi
          python -m pytest tests/ -v

  # ── JOB 2: Deploy Lambda 2 ───────────────────────────
  deploy-lambda2:
    name: Deploy Lambda 2
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Lambda 2 dependencies
        run: |
          cd jobofferapi/lambda2
          pip install requests -t .

      - name: Zip Lambda 2
        run: |
          cd jobofferapi/lambda2
          zip -r lambda2.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-east-1

      - name: Deploy Lambda 2 to AWS
        run: |
          aws lambda update-function-code \
            --function-name job-offer-data-fetcher \
            --zip-file fileb://jobofferapi/lambda2/lambda2.zip

  # ── JOB 3: Deploy Lambda 1 ───────────────────────────
  deploy-lambda1:
    name: Deploy Lambda 1
    runs-on: ubuntu-latest
    needs: deploy-lambda2

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Zip Lambda 1
        run: |
          cd jobofferapi/lambda1
          zip -r lambda1.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-east-1

      - name: Deploy Lambda 1 to AWS
        run: |
          aws lambda update-function-code \
            --function-name lambda1 \
            --zip-file fileb://jobofferapi/lambda1/lambda1.zip